<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Travel Planner - 智能旅行规划师</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root {
            --cream: #faf7f2;
            --warm-beige: #f0ebe3;
            --sage: #a8b5a2;
            --sage-light: #c5d1bf;
            --sage-dark: #7a8f72;
            --dusty-rose: #c9a9a6;
            --dusty-rose-light: #e8d5d3;
            --warm-gray: #8a8578;
            --text-primary: #3d3929;
            --text-secondary: #6b6555;
            --text-muted: #9e9788;
            --border: #e5dfd6;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', 'Noto Serif SC', -apple-system, sans-serif;
            background: var(--cream);
            color: var(--text-primary);
            min-height: 100vh;
            background-image: 
                radial-gradient(ellipse at 20% 50%, rgba(168, 181, 162, 0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 20%, rgba(201, 169, 166, 0.06) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 80%, rgba(168, 181, 162, 0.05) 0%, transparent 50%);
        }

        /* Serif font for headings and special text */
        .font-serif-cn {
            font-family: 'Noto Serif SC', 'Georgia', serif;
        }

        /* Subtle decorative line */
        .deco-line {
            width: 40px;
            height: 1px;
            background: var(--sage);
            opacity: 0.5;
        }

        .deco-line-long {
            width: 80px;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--sage), transparent);
        }

        /* Chat container */
        .chat-container {
            background: rgba(255, 255, 255, 0.6);
            border: 1px solid var(--border);
        }

        /* Message styles */
        .msg-user {
            background: linear-gradient(135deg, var(--sage), var(--sage-dark));
            color: white;
            border-radius: 20px 20px 4px 20px;
            box-shadow: 0 2px 12px rgba(122, 143, 114, 0.15);
        }

        .msg-ai {
            background: white;
            color: var(--text-primary);
            border-radius: 4px 20px 20px 20px;
            border: 1px solid var(--border);
            box-shadow: 0 2px 16px rgba(0, 0, 0, 0.04);
        }

        /* Quick tags */
        .quick-tag {
            background: white;
            border: 1px solid var(--border);
            color: var(--text-secondary);
            transition: all 0.3s ease;
            font-size: 13px;
        }

        .quick-tag:hover {
            background: var(--sage-light);
            border-color: var(--sage);
            color: var(--sage-dark);
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(168, 181, 162, 0.2);
        }

        /* Input area */
        .input-area {
            background: white;
            border: 1px solid var(--border);
            transition: all 0.3s ease;
        }

        .input-area:focus-within {
            border-color: var(--sage);
            box-shadow: 0 0 0 3px rgba(168, 181, 162, 0.1);
        }

        .input-area input {
            background: transparent;
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
        }

        .input-area input::placeholder {
            color: var(--text-muted);
            font-style: italic;
        }

        .send-btn {
            background: var(--sage);
            color: white;
            transition: all 0.3s ease;
        }

        .send-btn:hover {
            background: var(--sage-dark);
            transform: scale(1.05);
        }

        .send-btn:disabled {
            background: var(--border);
            cursor: not-allowed;
            transform: none;
        }

        /* Markdown content styling */
        .ai-content h1, .ai-content h2, .ai-content h3 {
            font-family: 'Noto Serif SC', serif;
            color: var(--text-primary);
            margin: 16px 0 8px 0;
        }

        .ai-content h1 { font-size: 1.25rem; font-weight: 600; }
        .ai-content h2 { font-size: 1.1rem; font-weight: 600; }
        .ai-content h3 { font-size: 1rem; font-weight: 500; }

        .ai-content p { margin: 6px 0; line-height: 1.7; }

        .ai-content ul, .ai-content ol {
            margin: 8px 0;
            padding-left: 20px;
        }

        .ai-content li { margin: 4px 0; line-height: 1.6; }

        .ai-content strong {
            color: var(--sage-dark);
            font-weight: 600;
        }

        .ai-content code {
            background: var(--warm-beige);
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 0.85em;
            color: var(--sage-dark);
        }

        .ai-content pre {
            background: var(--warm-beige);
            padding: 12px;
            border-radius: 8px;
            overflow-x: auto;
            margin: 8px 0;
        }

        .ai-content pre code {
            background: none;
            padding: 0;
        }

        .ai-content blockquote {
            border-left: 3px solid var(--sage-light);
            padding-left: 12px;
            color: var(--text-secondary);
            margin: 8px 0;
            font-style: italic;
        }

        .ai-content table {
            width: 100%;
            border-collapse: collapse;
            margin: 10px 0;
            font-size: 0.9em;
        }

        .ai-content th {
            background: var(--warm-beige);
            padding: 8px 12px;
            text-align: left;
            font-weight: 500;
            border-bottom: 1px solid var(--border);
        }

        .ai-content td {
            padding: 8px 12px;
            border-bottom: 1px solid var(--border);
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

        /* Loading dots */
        .loading-dots span {
            width: 6px;
            height: 6px;
            background: var(--sage);
            border-radius: 50%;
            display: inline-block;
            animation: bounce 1.4s infinite ease-in-out both;
        }
        .loading-dots span:nth-child(1) { animation-delay: -0.32s; }
        .loading-dots span:nth-child(2) { animation-delay: -0.16s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1.0); }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .fade-in { animation: fadeIn 0.4s ease-out; }

        /* Botanical decoration */
        .botanical-deco {
            position: absolute;
            opacity: 0.04;
            pointer-events: none;
            font-size: 120px;
        }

        /* Header decoration */
        .header-leaf {
            color: var(--sage);
            opacity: 0.6;
        }
    </style>
</head>
<body class="flex items-center justify-center p-4">
    <!-- Decorative elements -->
    <div class="botanical-deco top-10 left-10 select-none">🌿</div>
    <div class="botanical-deco bottom-10 right-10 select-none" style="font-size: 100px;">🍃</div>

    <div class="w-full max-w-3xl h-[92vh] flex flex-col relative">
        <!-- Header -->
        <header class="text-center pt-6 pb-4 relative">
            <div class="flex items-center justify-center gap-3 mb-2">
                <div class="deco-line"></div>
                <span class="header-leaf text-lg">✦</span>
                <div class="deco-line"></div>
            </div>
            <h1 class="font-serif-cn text-2xl font-semibold text-[var(--text-primary)] tracking-wide">
                旅行规划师
            </h1>
            <p class="text-sm text-[var(--text-muted)] mt-1.5 italic font-light">
                每一次出发，都值得被温柔以待
            </p>
            <div class="deco-line-long mx-auto mt-3"></div>
        </header>

        <!-- Chat Area -->
        <div class="flex-1 overflow-y-auto px-4 py-4 space-y-5" id="chatArea">
            <!-- Welcome message -->
            <div class="flex gap-3 fade-in">
                <div class="w-8 h-8 rounded-full bg-[var(--sage-light)] flex items-center justify-center flex-shrink-0 text-sm">
                    🌿
                </div>
                <div class="msg-ai px-5 py-4 max-w-[85%]">
                    <p class="text-[15px] leading-relaxed text-[var(--text-secondary)]">
                        你好呀，旅人。<br><br>
                        告诉我你想去的地方和天数，<br>
                        我来为你写一份温柔的旅行手札。
                    </p>
                </div>
            </div>

            <!-- Quick tags -->
            <div class="flex flex-wrap gap-2 pl-11" id="quickTags">
                <button class="quick-tag px-4 py-2 rounded-full cursor-pointer" onclick="sendQuick('成都 3天')">
                    <span>🐼</span> 成都 · 3天
                </button>
                <button class="quick-tag px-4 py-2 rounded-full cursor-pointer" onclick="sendQuick('大理 4天')">
                    <span>🏔️</span> 大理 · 4天
                </button>
                <button class="quick-tag px-4 py-2 rounded-full cursor-pointer" onclick="sendQuick('京都 5天')">
                    <span>🌸</span> 京都 · 5天
                </button>
                <button class="quick-tag px-4 py-2 rounded-full cursor-pointer" onclick="sendQuick('厦门 2天')">
                    <span>🌊</span> 厦门 · 2天
                </button>
                <button class="quick-tag px-4 py-2 rounded-full cursor-pointer" onclick="sendQuick('杭州 3天')">
                    <span>🍵</span> 杭州 · 3天
                </button>
                <button class="quick-tag px-4 py-2 rounded-full cursor-pointer" onclick="sendQuick('苏州 2天')">
                    <span>🏮</span> 苏州 · 2天
                </button>
            </div>
        </div>

        <!-- Input Area -->
        <div class="px-4 pb-5 pt-2">
            <div class="deco-line-long mx-auto mb-4"></div>
            <div class="input-area rounded-2xl px-5 py-3 flex items-center gap-3">
                <span class="text-[var(--sage)] text-lg flex-shrink-0">✎</span>
                <input 
                    type="text" 
                    id="userInput"
                    class="flex-1 outline-none text-[15px] py-1"
                    placeholder="告诉我你想去哪里，比如「大理 4天」..."
                    onkeypress="if(event.key==='Enter')sendMessage()"
                >
                <button 
                    id="sendBtn"
                    class="send-btn w-9 h-9 rounded-full flex items-center justify-center flex-shrink-0"
                    onclick="sendMessage()"
                >
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="22" y1="2" x2="11" y2="13"></line>
                        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                    </svg>
                </button>
            </div>
            <p class="text-center text-xs text-[var(--text-muted)] mt-3 opacity-60">
                AI 生成内容仅供参考 · 出行前请核实最新信息
            </p>
        </div>
    </div>

    <script>
        const chatArea = document.getElementById('chatArea');
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');
        const quickTags = document.getElementById('quickTags');

        // Configure marked
        marked.setOptions({
            breaks: true,
            gfm: true,
        });

        function sendQuick(text) {
            userInput.value = text;
            sendMessage();
        }

        function addMessage(content, isUser) {
            // Hide quick tags after first message
            if (quickTags) quickTags.style.display = 'none';

            const wrapper = document.createElement('div');
            wrapper.className = `flex gap-3 fade-in ${isUser ? 'justify-end' : ''}`;

            if (isUser) {
                wrapper.innerHTML = `
                    <div class="msg-user px-5 py-3 max-w-[75%]">
                        <p class="text-[15px] leading-relaxed">${escapeHtml(content)}</p>
                    </div>
                `;
            } else {
                wrapper.innerHTML = `
                    <div class="w-8 h-8 rounded-full bg-[var(--sage-light)] flex items-center justify-center flex-shrink-0 text-sm">
                        🌿
                    </div>
                    <div class="msg-ai px-5 py-4 max-w-[85%]">
                        <div class="ai-content text-[15px] leading-relaxed">${content}</div>
                    </div>
                `;
            }

            chatArea.appendChild(wrapper);
            chatArea.scrollTop = chatArea.scrollHeight;
            return wrapper;
        }

        function addLoading() {
            const wrapper = document.createElement('div');
            wrapper.className = 'flex gap-3 fade-in';
            wrapper.id = 'loadingMsg';
            wrapper.innerHTML = `
                <div class="w-8 h-8 rounded-full bg-[var(--sage-light)] flex items-center justify-center flex-shrink-0 text-sm">
                    🌿
                </div>
                <div class="msg-ai px-5 py-4">
                    <div class="loading-dots flex gap-1.5">
                        <span></span><span></span><span></span>
                    </div>
                </div>
            `;
            chatArea.appendChild(wrapper);
            chatArea.scrollTop = chatArea.scrollHeight;
        }

        function removeLoading() {
            const el = document.getElementById('loadingMsg');
            if (el) el.remove();
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        async function sendMessage() {
            const text = userInput.value.trim();
            if (!text) return;

            userInput.value = '';
            sendBtn.disabled = true;
            addMessage(text, true);
            addLoading();

            try {
                const response = await fetch('/stream_run', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text }),
                });

                if (!response.ok) throw new Error('请求失败');

                removeLoading();
                const msgEl = addMessage('', false);
                const contentEl = msgEl.querySelector('.ai-content');
                let fullText = '';

                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let buffer = '';

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    buffer += decoder.decode(value, { stream: true });
                    const lines = buffer.split('\n');
                    buffer = lines.pop() || '';

                    for (const line of lines) {
                        if (line.startsWith('data: ')) {
                            try {
                                const data = JSON.parse(line.slice(6));
                                if (data.type === 'answer' && data.content?.answer) {
                                    fullText += data.content.answer;
                                    contentEl.innerHTML = marked.parse(fullText);
                                    chatArea.scrollTop = chatArea.scrollHeight;
                                }
                            } catch (e) { /* ignore parse errors */ }
                        }
                    }
                }

                if (!fullText) {
                    contentEl.innerHTML = '<p class="text-[var(--text-muted)] italic">抱歉，暂时没有收到回复，请再试一次。</p>';
                }

            } catch (error) {
                removeLoading();
                addMessage('网络好像出了点问题，请稍后再试。', false);
                console.error(error);
            }

            sendBtn.disabled = false;
            userInput.focus();
        }

        // Auto focus
        userInput.focus();
    </script>
</body>
</html>
